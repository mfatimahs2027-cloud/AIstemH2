<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Animals</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">Animals by Mahnoor Fatima</div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <!-- PAGE TITLE -->
    <section class="page-title section">
        <div class="container">
            <h1>Contact</h1>
            <p>Get in touch using the form below.</p>
        </div>
    </section>


    <!-- CONTACT FORM -->
    <section class="contact section">
        <div class="container">
            <form action="#" method="post" class="contact-form">

                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="your name" required>

                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder="put your email, @gmail.com/org" required>

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Subject" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="message" required></textarea>

                <button type="submit" class="button">Submit</button>

            </form>
        </div>
    </section>


    <!-- FOOTER -->
    <footer class="site-footer">
        <p>© 2026 Animals by Mahnoor Fatima</p>
    </footer>

</body>
</html>
